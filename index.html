<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ねがいぐも — 痛みの奥の、ほんとうの願いへ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@400;700&family=Yomogi&display=swap" rel="stylesheet" />
<style>
  html{background:#EAF5FF}
  html,body{margin:0;padding:0}
  body{background:linear-gradient(180deg,#EAF5FF,#FFE9F3);min-height:100vh}
  #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(180deg,#EAF5FF,#FFE9F3);z-index:99;overflow:hidden;
    font-family:'Yomogi','Zen Maru Gothic',sans-serif;color:#7A86B8}
  #boot .arc{position:absolute;left:50%;top:-360px;width:720px;height:720px;transform:translateX(-50%);
    border-radius:50%;filter:blur(7px);opacity:.8;pointer-events:none;
    background:radial-gradient(circle,transparent 53%,rgba(255,150,180,.28) 54% 59%,rgba(255,200,140,.26) 59% 64%,
      rgba(255,240,170,.24) 64% 69%,rgba(165,230,190,.24) 69% 74%,rgba(150,200,255,.28) 74% 79%,
      rgba(195,165,255,.26) 79% 84%,transparent 85%)}
  #boot .tw{position:absolute;font-size:14px;color:#FFD9A0;text-shadow:0 0 8px rgba(255,200,120,.85);
    animation:tw 2.8s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}
  #boot .puff{position:absolute;background:#fff;border-radius:999px;filter:blur(1.5px);
    box-shadow:0 6px 16px rgba(160,180,225,.25);animation:puffDrift linear infinite}
  #boot .puff::before,#boot .puff::after{content:"";position:absolute;background:#fff;border-radius:50%}
  #boot .puff::before{width:55%;height:170%;left:12%;top:-80%}
  #boot .puff::after{width:38%;height:125%;right:12%;top:-50%}
  @keyframes puffDrift{from{transform:translateX(-220px)}to{transform:translateX(calc(100vw + 220px))}}
  #boot img{width:150px;height:auto;animation:bob 2.6s ease-in-out infinite;
    filter:drop-shadow(0 6px 14px rgba(150,170,220,.4));position:relative}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  #boot .msg{margin-top:14px;font-size:15px;letter-spacing:.08em;position:relative}
  .bootdots{display:flex;gap:10px;margin-top:12px}
  .bootdots span{width:12px;height:12px;border-radius:50%;background:#fff;
    box-shadow:0 4px 10px rgba(150,170,220,.35);animation:cloudBob 1.3s ease-in-out infinite}
  .bootdots span:nth-child(2){animation-delay:.18s}
  .bootdots span:nth-child(3){animation-delay:.36s}
  @keyframes cloudBob{0%,100%{transform:translateY(0);opacity:.55}50%{transform:translateY(-10px);opacity:1}}
  #boot-fail{display:none;font-size:12px;margin-top:10px;color:#9AA6C8;text-align:center;padding:0 24px;line-height:1.8;position:relative}
  @media (prefers-reduced-motion:reduce){#boot *{animation:none !important}}
</style>
</head>
<body>
<div id="boot">
  <div class="arc"></div>
  <div class="puff" style="top:12%;width:100px;height:38px;opacity:.9;animation-duration:60s;animation-delay:-20s"></div>
  <div class="puff" style="top:38%;width:70px;height:27px;opacity:.65;animation-duration:80s;animation-delay:-55s"></div>
  <div class="puff" style="top:72%;width:115px;height:44px;opacity:.55;animation-duration:95s;animation-delay:-40s"></div>
  <span class="tw" style="left:14%;top:18%">✦</span>
  <span class="tw" style="left:80%;top:12%;animation-delay:.5s">✦</span>
  <span class="tw" style="left:22%;top:68%;animation-delay:1s">✦</span>
  <span class="tw" style="left:86%;top:60%;animation-delay:1.5s">✦</span>
  <span class="tw" style="left:50%;top:84%;animation-delay:2s">✦</span>
  <span class="tw" style="left:65%;top:30%;animation-delay:.8s">✦</span>
  <img alt="" src="/milly/milly_std.webp" />
  <div class="msg">ねがいぐもを ひろげています…</div>
  <div class="bootdots"><span></span><span></span><span></span></div>
  <div id="boot-fail">読み込みに時間がかかっています。<br/>通信環境を確認して、ページを再読み込みしてみてください。</div>
</div>
<div id="root"></div>
<script>
  setTimeout(function(){
    var f=document.getElementById('boot-fail');
    if(f && document.getElementById('boot')) f.style.display='block';
  }, 4000);
</script>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
